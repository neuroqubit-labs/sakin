services:
  postgres:
    image: postgres:17-alpine
    container_name: sakin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sakin
      POSTGRES_PASSWORD: sakin_dev_pass
      POSTGRES_DB: sakin_dev
    ports:
      - "5432:5432"
    volumes:
      - sakin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sakin -d sakin_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sakin_postgres_data:
