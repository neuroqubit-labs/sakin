name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'client/mobile/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'client/mobile/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/mobile-ci.yml'

jobs:
  check:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter=@sakin/shared build

      - name: Typecheck
        run: pnpm --filter=@sakin/mobile typecheck

      - name: Lint
        run: pnpm --filter=@sakin/mobile lint

      - name: Test
        run: pnpm --filter=@sakin/mobile test
